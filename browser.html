<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Browse Anime - AnimeFiles</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="images/favicon-32x32.png" sizes="32x32">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/bundle.css">
    <link rel="stylesheet" href="css/main.css">
    <style>
        body { background: #0c1116; color: #fff; font-family: 'Poppins', sans-serif; margin: 0; }
        * { box-sizing: border-box; }
        header { background: #0c1116; border-bottom: 1px solid rgba(228,95,58,0.15); position: sticky; top: 0; z-index: 999; }
        .nav-wrapper { display: flex; align-items: center; gap: 10px; height: 60px; padding: 0 16px; max-width: 1400px; margin: 0 auto; }
        .nav-brand img { height: 36px; }
        .nav-search { flex: 1; max-width: 400px; }
        .nav-search form { display: flex; align-items: center; background: #181d22; border-radius: 8px; border: 1px solid rgba(255,255,255,0.08); padding: 0 12px; gap: 8px; }
        .nav-search form:focus-within { border-color: #E45F3A; }
        .nav-search form input { flex: 1; background: none; border: none; outline: none; color: #fff; font-size: 0.85rem; padding: 10px 0; }
        .nav-search form input::placeholder { color: rgba(255,255,255,0.35); }
        .nav-search form i { color: rgba(255,255,255,0.4); }
        .nav-btn { background: none; border: none; color: rgba(255,255,255,0.7); font-size: 1rem; cursor: pointer; padding: 8px; border-radius: 6px; text-decoration: none; transition: color 0.2s; }
        .nav-btn:hover { color: #E45F3A; }

        .container { max-width: 1400px; margin: 0 auto; padding: 0 16px; }
        .page-header { padding: 28px 0 20px; border-bottom: 1px solid rgba(255,255,255,0.06); margin-bottom: 24px; }
        .page-header h1 { font-size: 1.4rem; font-weight: 800; margin: 0 0 4px; }
        .page-header p { font-size: 0.85rem; color: rgba(255,255,255,0.45); margin: 0; }

        /* Filters */
        .filter-bar { background: #181d22; border-radius: 12px; padding: 16px 20px; margin-bottom: 24px; display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; border: 1px solid rgba(255,255,255,0.06); }
        .filter-group { display: flex; flex-direction: column; gap: 5px; min-width: 130px; }
        .filter-group label { font-size: 0.72rem; color: rgba(255,255,255,0.45); text-transform: uppercase; letter-spacing: 0.5px; }
        .filter-group select { background: #11161b; border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 7px; padding: 8px 12px; font-size: 0.83rem; font-family: 'Poppins', sans-serif; cursor: pointer; outline: none; }
        .filter-group select:focus { border-color: #E45F3A; }
        .filter-group select option { background: #181d22; }
        .btn-filter { background: #E45F3A; color: #fff; border: none; border-radius: 8px; padding: 9px 22px; font-size: 0.85rem; font-weight: 700; cursor: pointer; transition: opacity 0.2s; align-self: flex-end; font-family: 'Poppins', sans-serif; }
        .btn-filter:hover { opacity: 0.85; }
        .btn-reset { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 9px 16px; font-size: 0.85rem; cursor: pointer; align-self: flex-end; font-family: 'Poppins', sans-serif; transition: all 0.2s; }
        .btn-reset:hover { background: rgba(255,255,255,0.1); color: #fff; }

        /* Search result heading */
        .result-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
        .result-meta .count { font-size: 0.85rem; color: rgba(255,255,255,0.5); }
        .result-meta .count span { color: #E45F3A; font-weight: 700; }

        /* Grid */
        .anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 16px; }
        @media (min-width: 768px) { .anime-grid { grid-template-columns: repeat(auto-fill, minmax(175px, 1fr)); } }
        @media (min-width: 1200px) { .anime-grid { grid-template-columns: repeat(6, 1fr); } }

        .flw-item { position: relative; cursor: pointer; }
        .film-poster { position: relative; border-radius: 8px; overflow: hidden; aspect-ratio: 2/3; background: #181d22; }
        .film-poster img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.3s; }
        .flw-item:hover .film-poster img { transform: scale(1.06); }
        .film-poster-ahh { position: absolute; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.25s; }
        .flw-item:hover .film-poster-ahh { opacity: 1; }
        .btn-play { width: 44px; height: 44px; border-radius: 50%; background: #E45F3A; color: #fff; display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 0.95rem; box-shadow: 0 4px 16px rgba(228,95,58,0.5); transition: transform 0.2s; }
        .btn-play:hover { transform: scale(1.1); color: #fff; }
        .tick { position: absolute; bottom: 0; left: 0; right: 0; display: flex; gap: 4px; padding: 6px; background: linear-gradient(transparent, rgba(0,0,0,0.8)); flex-wrap: wrap; }
        .tick-item { font-size: 0.67rem; font-weight: 700; padding: 2px 5px; border-radius: 3px; }
        .tick-rate { background: rgba(255,193,0,0.9); color: #111; }
        .tick-eps { background: rgba(46,175,78,0.9); color: #fff; }
        .film-detail { padding: 8px 2px 0; }
        .film-name a { color: #fff; text-decoration: none; font-size: 0.86rem; font-weight: 600; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.3; }
        .film-name a:hover { color: #E45F3A; }
        .fd-infor { display: flex; gap: 5px; margin-top: 4px; flex-wrap: wrap; }
        .fdi-item { font-size: 0.71rem; color: rgba(255,255,255,0.4); }

        /* Pagination */
        .pagination { display: flex; justify-content: center; gap: 6px; margin: 32px 0; flex-wrap: wrap; }
        .page-btn { background: #181d22; border: 1px solid rgba(255,255,255,0.08); color: rgba(255,255,255,0.6); border-radius: 7px; padding: 8px 14px; font-size: 0.83rem; cursor: pointer; transition: all 0.2s; font-family: 'Poppins', sans-serif; }
        .page-btn:hover { border-color: #E45F3A; color: #fff; }
        .page-btn.active { background: #E45F3A; border-color: #E45F3A; color: #fff; }
        .page-btn:disabled { opacity: 0.35; cursor: default; }

        /* Skeleton */
        .skeleton-card .film-poster { background: linear-gradient(90deg, #181d22 0, #242b31 50%, #181d22 100%); background-size: 200% 100%; animation: shimmer 1.2s ease-in-out infinite; }
        .skeleton-card .film-name-sk { height: 12px; background: linear-gradient(90deg, #181d22 0, #242b31 50%, #181d22 100%); background-size: 200% 100%; animation: shimmer 1.2s ease-in-out infinite; border-radius: 4px; margin-top: 10px; width: 80%; }
        @keyframes shimmer { 0% { background-position: 200% 0 } 100% { background-position: -200% 0 } }

        /* No results */
        .no-results { text-align: center; padding: 60px 20px; color: rgba(255,255,255,0.4); }
        .no-results i { font-size: 3rem; margin-bottom: 16px; color: rgba(228,95,58,0.4); display: block; }
        .no-results h3 { font-size: 1.1rem; margin: 0 0 8px; color: rgba(255,255,255,0.6); }

        footer { background: #080c0f; padding: 16px; text-align: center; font-size: 0.75rem; color: rgba(255,255,255,0.3); border-top: 1px solid rgba(228,95,58,0.1); margin-top: 16px; }
        footer a { color: rgba(255,255,255,0.35); text-decoration: none; margin: 0 8px; }
        footer a:hover { color: #E45F3A; }
    </style>
</head>
<body>
<header>
    <div class="nav-wrapper">
        <a href="index.html" class="nav-brand"><img src="images/logo.png" alt="AnimeFiles"></a>
        <div class="nav-search">
            <form id="search-form" autocomplete="off">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="keyword-input" name="keyword" placeholder="Search anime...">
            </form>
        </div>
        <a href="index.html" class="nav-btn"><i class="fa-solid fa-house"></i></a>
        <a href="index.html" class="nav-btn"><i class="fa-solid fa-shuffle"></i></a>
        <a href="login.html" class="nav-btn"><i class="fa-solid fa-user"></i></a>
    </div>
</header>

<div class="container">
    <div class="page-header">
        <h1 id="page-title">Browse Anime</h1>
        <p id="page-sub">Explore thousands of anime titles</p>
    </div>

    <!-- FILTERS -->
    <div class="filter-bar">
        <div class="filter-group">
            <label>Genre</label>
            <select id="filter-genre">
                <option value="">All Genres</option>
                <option value="1">Action</option>
                <option value="2">Adventure</option>
                <option value="4">Comedy</option>
                <option value="8">Drama</option>
                <option value="10">Fantasy</option>
                <option value="14">Horror</option>
                <option value="22">Romance</option>
                <option value="24">Sci-Fi</option>
                <option value="36">Slice of Life</option>
                <option value="30">Sports</option>
                <option value="37">Supernatural</option>
                <option value="7">Mystery</option>
                <option value="40">Psychological</option>
                <option value="62">Isekai</option>
                <option value="17">Martial Arts</option>
                <option value="18">Mecha</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Type</label>
            <select id="filter-type">
                <option value="">All Types</option>
                <option value="tv">TV</option>
                <option value="movie">Movie</option>
                <option value="ova">OVA</option>
                <option value="ona">ONA</option>
                <option value="special">Special</option>
                <option value="music">Music</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Status</label>
            <select id="filter-status">
                <option value="">All Status</option>
                <option value="airing">Airing</option>
                <option value="complete">Completed</option>
                <option value="upcoming">Upcoming</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Rating</label>
            <select id="filter-rating">
                <option value="">Any Rating</option>
                <option value="g">G - All Ages</option>
                <option value="pg">PG - Children</option>
                <option value="pg13">PG-13 - Teens</option>
                <option value="r17">R - 17+</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Sort By</label>
            <select id="filter-order">
                <option value="bypopularity">Popularity</option>
                <option value="score">Score</option>
                <option value="rank">Rank</option>
                <option value="title">Title</option>
                <option value="episodes">Episodes</option>
                <option value="start_date">Newest</option>
            </select>
        </div>
        <button class="btn-filter" onclick="applyFilters(1)"><i class="fa-solid fa-magnifying-glass"></i> Search</button>
        <button class="btn-reset" onclick="resetFilters()"><i class="fa-solid fa-rotate-left"></i> Reset</button>
    </div>

    <div class="result-meta">
        <div class="count" id="result-count">Loading results...</div>
    </div>

    <div class="anime-grid" id="results-grid">
        <!-- Skeletons -->
        <div class="flw-item skeleton-card"><div class="film-poster"></div><div class="film-name-sk"></div></div>
        <div class="flw-item skeleton-card"><div class="film-poster"></div><div class="film-name-sk" style="width:65%"></div></div>
        <div class="flw-item skeleton-card"><div class="film-poster"></div><div class="film-name-sk" style="width:80%"></div></div>
        <div class="flw-item skeleton-card"><div class="film-poster"></div><div class="film-name-sk" style="width:70%"></div></div>
        <div class="flw-item skeleton-card"><div class="film-poster"></div><div class="film-name-sk" style="width:90%"></div></div>
        <div class="flw-item skeleton-card"><div class="film-poster"></div><div class="film-name-sk" style="width:75%"></div></div>
        <div class="flw-item skeleton-card"><div class="film-poster"></div><div class="film-name-sk"></div></div>
        <div class="flw-item skeleton-card"><div class="film-poster"></div><div class="film-name-sk" style="width:60%"></div></div>
        <div class="flw-item skeleton-card"><div class="film-poster"></div><div class="film-name-sk" style="width:85%"></div></div>
        <div class="flw-item skeleton-card"><div class="film-poster"></div><div class="film-name-sk" style="width:70%"></div></div>
        <div class="flw-item skeleton-card"><div class="film-poster"></div><div class="film-name-sk" style="width:80%"></div></div>
        <div class="flw-item skeleton-card"><div class="film-poster"></div><div class="film-name-sk" style="width:65%"></div></div>
    </div>

    <div class="pagination" id="pagination"></div>
</div>

<footer>
    <span>&copy; AnimeFiles — All rights reserved.</span>
    <a href="index.html">Home</a>
    <a href="#">Privacy</a>
    <a href="#">DMCA</a>
    <a href="#">Contact</a>
</footer>

<script src="js/jquery.min.js"></script>
<script>

const IS_LIVE_SERVER = ['127.0.0.1','localhost'].includes(window.location.hostname);
function buildWatchLink(slug, ep) {
    if (IS_LIVE_SERVER) return ep ? 'watch.html?slug='+slug+'&ep='+ep : 'watch.html?slug='+slug;
    return ep ? '/watch/'+slug+'?ep='+ep : '/watch/'+slug;
}

let currentPage = 1;
let currentKeyword = '';

// Read URL params on load
const params = new URLSearchParams(window.location.search);
if (params.get('keyword')) {
    currentKeyword = params.get('keyword');
    document.getElementById('keyword-input').value = currentKeyword;
    document.getElementById('page-title').textContent = `Search: "${currentKeyword}"`;
    document.getElementById('page-sub').textContent = 'Search results for your query';
}
if (params.get('genre')) document.getElementById('filter-genre').value = params.get('genre');
if (params.get('type'))  document.getElementById('filter-type').value  = params.get('type');

// Search form submit
document.getElementById('search-form').addEventListener('submit', function(e) {
    e.preventDefault();
    currentKeyword = document.getElementById('keyword-input').value.trim();
    applyFilters(1);
});

function buildApiUrl(page) {
    const kw     = currentKeyword;
    const genre  = document.getElementById('filter-genre').value;
    const type   = document.getElementById('filter-type').value;
    const status = document.getElementById('filter-status').value;
    const rating = document.getElementById('filter-rating').value;
    const order  = document.getElementById('filter-order').value;
    const limit  = 24;

    let url = `https://api.jikan.moe/v4/anime?page=${page}&limit=${limit}&sfw=true`;
    if (kw)     url += `&q=${encodeURIComponent(kw)}`;
    if (genre)  url += `&genres=${genre}`;
    if (type)   url += `&type=${type}`;
    if (status) url += `&status=${status}`;
    if (rating) url += `&rating=${rating}`;
    if (!kw)    url += `&order_by=${order}`;
    return url;
}

async function applyFilters(page) {
    currentPage = page;
    const kw = document.getElementById('keyword-input').value.trim();
    currentKeyword = kw;

    // Update page title
    if (kw) {
        document.getElementById('page-title').textContent = `Search: "${kw}"`;
    } else {
        document.getElementById('page-title').textContent = 'Browse Anime';
    }

    // Show skeletons
    document.getElementById('result-count').textContent = 'Loading...';
    let skeletons = '';
    for (let i = 0; i < 12; i++) skeletons += `<div class="flw-item skeleton-card"><div class="film-poster"></div><div class="film-name-sk" style="width:${60+Math.random()*30}%"></div></div>`;
    document.getElementById('results-grid').innerHTML = skeletons;
    document.getElementById('pagination').innerHTML = '';

    try {
        const res  = await fetch(buildApiUrl(page));
        const json = await res.json();
        renderResults(json);
    } catch(e) {
        document.getElementById('results-grid').innerHTML = `<div class="no-results" style="grid-column:1/-1"><i class="fa-solid fa-circle-exclamation"></i><h3>Failed to load</h3><p>Please try again</p></div>`;
    }
}

function renderResults(json) {
    const data       = json.data || [];
    const pagination = json.pagination || {};
    const total      = pagination.items?.total || data.length;

    document.getElementById('result-count').innerHTML = `Showing <span>${data.length}</span> of <span>${total}</span> results`;

    if (data.length === 0) {
        document.getElementById('results-grid').innerHTML = `<div class="no-results" style="grid-column:1/-1"><i class="fa-solid fa-face-sad-tear"></i><h3>No anime found</h3><p>Try different keywords or filters</p></div>`;
        return;
    }

    let html = '';
    data.forEach(anime => {
        const slug  = (anime.title || '').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
        const img   = anime.images?.jpg?.image_url || '';
        const score = anime.score ? anime.score.toFixed(1) : '';
        const ep    = anime.episodes || '?';
        const type  = anime.type || '';

        html += `<div class="flw-item">
            <div class="film-poster">
                <img src="${img}" alt="${anime.title}" loading="lazy" onerror="this.src='images/preview.png'">
                <div class="film-poster-ahh">
                    <a href="/watch/${slug}" class="btn-play"><i class="fa-solid fa-play"></i></a>
                </div>
                <div class="tick ltr">
                    ${score ? `<div class="tick-item tick-rate"><i class="fa-solid fa-star" style="font-size:0.6rem"></i> ${score}</div>` : ''}
                    <div class="tick-item tick-eps">EP ${ep}</div>
                </div>
            </div>
            <div class="film-detail">
                <h3 class="film-name"><a href="/watch/${slug}">${anime.title}</a></h3>
                <div class="fd-infor">
                    <span class="fdi-item">${type}</span>
                    ${anime.year ? `<span class="fdi-item">${anime.year}</span>` : ''}
                </div>
            </div>
        </div>`;
    });
    document.getElementById('results-grid').innerHTML = html;

    // Pagination
    const totalPages = pagination.last_visible_page || 1;
    renderPagination(currentPage, totalPages);
}

function renderPagination(current, total) {
    if (total <= 1) return;
    let html = '';
    const maxBtns = 7;

    html += `<button class="page-btn" onclick="applyFilters(${current-1})" ${current<=1?'disabled':''}>
        <i class="fa-solid fa-chevron-left"></i>
    </button>`;

    let start = Math.max(1, current - 3);
    let end   = Math.min(total, start + maxBtns - 1);
    if (end - start < maxBtns - 1) start = Math.max(1, end - maxBtns + 1);

    if (start > 1) {
        html += `<button class="page-btn" onclick="applyFilters(1)">1</button>`;
        if (start > 2) html += `<span style="color:rgba(255,255,255,0.3);padding:8px 4px">...</span>`;
    }
    for (let i = start; i <= end; i++) {
        html += `<button class="page-btn ${i===current?'active':''}" onclick="applyFilters(${i})">${i}</button>`;
    }
    if (end < total) {
        if (end < total - 1) html += `<span style="color:rgba(255,255,255,0.3);padding:8px 4px">...</span>`;
        html += `<button class="page-btn" onclick="applyFilters(${total})">${total}</button>`;
    }

    html += `<button class="page-btn" onclick="applyFilters(${current+1})" ${current>=total?'disabled':''}>
        <i class="fa-solid fa-chevron-right"></i>
    </button>`;

    document.getElementById('pagination').innerHTML = html;
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetFilters() {
    document.getElementById('filter-genre').value  = '';
    document.getElementById('filter-type').value   = '';
    document.getElementById('filter-status').value = '';
    document.getElementById('filter-rating').value = '';
    document.getElementById('filter-order').value  = 'bypopularity';
    document.getElementById('keyword-input').value = '';
    currentKeyword = '';
    document.getElementById('page-title').textContent = 'Browse Anime';
    applyFilters(1);
}

// Init
applyFilters(1);
</script>
</body>
</html>
